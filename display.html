<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza 24 Kamloops</title>
  <style>
    :root {
      --bg: #180b08;
      --panel: rgba(48, 18, 12, 0.9);
      --panel-strong: rgba(90, 29, 16, 0.92);
      --accent: #ffb028;
      --accent-2: #ff6f2c;
      --text: #fff5ea;
      --muted: #f1d4ba;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 176, 40, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 111, 44, 0.18), transparent 30%),
        linear-gradient(140deg, #120706, #2a0f09 45%, #150806);
      min-height: 100vh;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 0.8fr) minmax(0, 1.2fr);
      gap: 20px;
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(255, 176, 40, 0.18), rgba(255, 111, 44, 0.1)),
        var(--panel-strong);
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 0.95;
    }

    .subtitle,
    .footer-note,
    .meta {
      color: var(--muted);
    }

    .subtitle {
      font-size: 1.05rem;
      line-height: 1.4;
      max-width: 56ch;
    }

    .promo-list,
    .menu-columns {
      padding: 20px;
    }

    .promo-list {
      display: grid;
      gap: 14px;
    }

    .promo-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.04);
    }

    .promo-card h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
    }

    .promo-card .price {
      color: var(--accent);
      font-size: 1.25rem;
      font-weight: 800;
      margin: 8px 0;
    }

    .promo-card .code {
      display: inline-block;
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 176, 40, 0.12);
      border: 1px solid rgba(255, 176, 40, 0.3);
      color: #ffd88b;
      font-weight: 700;
    }

    .menu-columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-content: start;
    }

    .category {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.04);
    }

    .category h3 {
      margin: 0 0 14px;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 14px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .item:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .item-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .item-size,
    .item-desc {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .item-price {
      font-weight: 800;
      font-size: 1rem;
      color: #ffe4a8;
      white-space: nowrap;
    }

    .footer-note,
    .meta {
      padding: 0 20px 20px;
      font-size: 0.9rem;
    }

    .status {
      position: fixed;
      right: 14px;
      bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.82rem;
    }

    .error {
      color: #ffd1d1;
      background: rgba(120, 0, 0, 0.22);
      border-color: rgba(255, 80, 80, 0.35);
    }

    @media (max-width: 1100px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .menu-columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="hero">
        <div class="eyebrow" id="eyebrow">Live Menu</div>
        <h1 id="title">Pizza 24 Kamloops</h1>
        <p class="subtitle" id="subtitle">Loading menu and promos...</p>
      </div>
      <div class="promo-list" id="promos"></div>
      <p class="footer-note" id="footer"></p>
    </section>

    <section class="panel">
      <div class="hero">
        <div class="eyebrow">Menu</div>
        <p class="meta" id="menu-meta">Refreshing every 60 seconds</p>
      </div>
      <div class="menu-columns" id="menu"></div>
    </section>
  </main>

  <div class="status" id="status">Waiting for sheet...</div>

  <script>
    const SHEET_IDS = {
      menu: "1ao-Y71eoxtfkinawTOcHl67QtFKQBR0V1khOny_Sc-E",
      promos: "1gFu6k_IGTrA0N-_LKOQ-ISbGQBAVjG17isrjlLfjk4s",
      settings: "192vUPGs2UvafqAwtgZcZel_rsgrv3t1igtxkBUoJzto"
    };
    const REFRESH_MS = 60000;

    function gvizUrl(sheetKey) {
      return `https://docs.google.com/spreadsheets/d/${SHEET_IDS[sheetKey]}/gviz/tq?tqx=out:json`;
    }

    async function loadSheet(sheetKey) {
      const response = await fetch(gvizUrl(sheetKey), { cache: "no-store" });
      const raw = await response.text();
      const json = JSON.parse(raw.substring(47, raw.length - 2));
      const cols = json.table.cols.map((col) => col.label);
      return json.table.rows.map((row) => {
        const item = {};
        cols.forEach((label, index) => {
          item[label] = row.c[index] ? row.c[index].v : "";
        });
        return item;
      });
    }

    function truthy(value) {
      return String(value).toLowerCase() === "true";
    }

    function renderPromos(rows) {
      const activeRows = rows
        .filter((row) => truthy(row.active))
        .sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0));
      const container = document.getElementById("promos");
      container.innerHTML = activeRows.map((row) => `
        <article class="promo-card">
          <h2>${row.title || ""}</h2>
          <div>${row.subtitle || ""}</div>
          ${row.price_text ? `<div class="price">${row.price_text}</div>` : ""}
          ${row.details ? `<div class="subtitle">${row.details}</div>` : ""}
          ${row.code ? `<div class="code">Code: ${row.code}</div>` : ""}
        </article>
      `).join("");
    }

    function renderMenu(rows) {
      const activeRows = rows
        .filter((row) => truthy(row.active))
        .sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0));

      const grouped = activeRows.reduce((acc, row) => {
        const category = row.category || "Menu";
        (acc[category] ||= []).push(row);
        return acc;
      }, {});

      const container = document.getElementById("menu");
      container.innerHTML = Object.entries(grouped).map(([category, items]) => `
        <section class="category">
          <h3>${category}</h3>
          ${items.map((item) => `
            <article class="item">
              <div>
                <div class="item-name">${item.item_name || ""}</div>
                ${item.size ? `<div class="item-size">${item.size}</div>` : ""}
                ${item.description ? `<div class="item-desc">${item.description}</div>` : ""}
              </div>
              <div class="item-price">${item.price || ""}</div>
            </article>
          `).join("")}
        </section>
      `).join("");
    }

    function applySettings(rows) {
      const settings = Object.fromEntries(rows.map((row) => [row.key, row.value]));
      document.getElementById("title").textContent = settings.title || "Pizza 24 Kamloops";
      document.getElementById("subtitle").textContent = settings.subtitle || "Fresh menu updates from Google Sheets.";
      document.getElementById("footer").textContent = settings.footer || "";
      document.getElementById("eyebrow").textContent = settings.eyebrow || "Live Menu";
      document.title = settings.title || "Pizza 24 Kamloops";
    }

    function setStatus(message, isError = false) {
      const node = document.getElementById("status");
      node.textContent = message;
      node.className = isError ? "status error" : "status";
    }

    async function refresh() {
      if (Object.values(SHEET_IDS).some((id) => !id || id.includes("PASTE_YOUR"))) {
        setStatus("Paste your Google Sheet IDs into display.html", true);
        return;
      }

      try {
        const [menuRows, promoRows, settingsRows] = await Promise.all([
          loadSheet("menu"),
          loadSheet("promos"),
          loadSheet("settings")
        ]);
        renderMenu(menuRows);
        renderPromos(promoRows);
        applySettings(settingsRows);
        document.getElementById("menu-meta").textContent = `Updated ${new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })} • Refreshing every 60 seconds`;
        setStatus("Connected to Google Sheets");
      } catch (error) {
        console.error(error);
        setStatus("Could not load the published Google Sheet", true);
      }
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
